<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Navbar 1</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet">
    <style>
        * {
            padding: 0;
            margin: 0;
            box-sizing: border-box;
            text-decoration: none;
            border: none;
            background: none;
            font-family: "Roboto", sans-serif;
            font-size: 16px;
            color: #000000;
            font-weight: 400;
        }

        header {
            border: 1px solid red;
            width: 100%;
            height: 72px;
            padding: 16px 64px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header-content {

            display: flex;
            justify-content: center;
            align-items: center;
            gap: 32px;
        }

        nav {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 32px;
        }

        .dropdown-nav {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 4px;
        }

        .btn-wrapper {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 16px;
        }

        .btn-wrapper button {
            padding: 8px 20px;
            border: 1px solid black;
        }

        .btn-proimary {
            background-color: black;
            color: white;
        }
    </style>
</head>

<body>
    <header>
        <img src="./Company Logo.svg" alt="Company Logo">
        <div class="header-content">
            <nav>
                <a href="">Link One</a>
                <a href="">Link Two</a>
                <a href="">Link Three</a>
                <div class="dropdown-nav">
                    <a href="">Link Four</a>
                    <button>
                        <img src="./Chevron Down.svg" alt="">
                    </button>
                </div>
            </nav>
            <div class="btn-wrapper">
                <button>Button</button>
                <button class="btn-proimary">Button</button>
            </div>
        </div>
    </header>
</body>

</html>
