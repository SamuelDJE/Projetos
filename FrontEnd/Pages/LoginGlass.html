<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../Styles/LoginGlass.css">
    <title>Login Glass</title>
</head>

<body>
    <form id="meuFormulario">
        <div class="container">
            <h1>Login</h1>
            <div class="input-box">
                <input type="text" id="usuario" placeholder="Usuário" maxlength="30">
            </div>
            <div class="input-box">
                <input type="password" id="senha" placeholder="Senha" maxlength="30">
            </div>

            <a href="">Esqueceu senha?</a>

            <button type="submit" class="botao-entrar">Entrar</button>
            
            <div class="formasDe-login">
                <button type="submit" class="login-google"><img src="../Imgs/pesquisa.png" alt="Google" height="13px"
                        width="13px"></button>
                <button type="submit" class="login-github"><img src="../Imgs/github.png" alt="GitHub" height="13px"
                        width="13px"></button>
                <button type="submit" class="login-facebook"><img src="../Imgs/facebook.png" alt="Facebook"
                        height="13px" width="13px"></button>
            </div>
            <p>Ainda não possui uma conta?<a href="">Cadastre-se</a></p>

        </div>

    </form>


</body>

</html>
